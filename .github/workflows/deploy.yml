name: Deploy Website to AWS S3

# This tells GitHub to run the pipeline every time you push to the 'main' branch
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Grabs your latest code
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Logs securely into your AWS account using your Secrets
    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ca-central-1  

    # 3. Pushes the files to your S3 bucket
    - name: Sync files to S3
      run: |
        aws s3 sync . s3://mspconsulting.ca --exclude ".git/*" --exclude ".github/*" --delete